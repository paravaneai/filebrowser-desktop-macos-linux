name: .NET

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/FileBrowserDesktop.csproj --runtime win-x64

      - name: Build
        run: dotnet build src/FileBrowserDesktop.csproj --configuration Release --runtime win-x64 --no-restore

      - name: Publish
        run: dotnet publish src/FileBrowserDesktop.csproj --configuration Release --runtime win-x64 --self-contained false --no-build --output artifacts/publish
