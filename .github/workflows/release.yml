name: Release

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

jobs:
  package:
    name: Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Package
        run: sh ./package-release.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: dist/FileBrowserDesktop-*.tar.gz

  release:
    name: Create release
    needs: package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu

          tag="${GITHUB_REF_NAME}"
          notes=".github/release-notes/${tag}.md"

          if [ ! -f "$notes" ]; then
            notes="CHANGELOG.md"
          fi

          gh release create "$tag" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$tag" \
            --notes-file "$notes" \
            --prerelease \
            release-artifacts/FileBrowserDesktop-*.tar.gz
